<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/common.css">
    <title>전기 사고 목차</title>
    <!-- <script src = "../js/effect.js"></script> -->
    <style>
        body {
            margin: 0;
            background-color: #f0f2f5;
            font-family: 'Pretendard', sans-serif;
        }

     /* 제목 영역: 헤더에 가려지지 않도록 여백 조정 */
        .toc-header-area {
            background-color: #1c1f3a;
            /* 상단 패딩을 80px(헤더높이) + 60px(기존여백) = 140px로 수정 */
            padding: 140px 80px 40px; 
            margin-bottom: 40px;
            /* 헤더 프레임이 absolute일 경우를 대비해 위치 보정 */
            position: relative; 
            z-index: 1;
        }

        /* 만약 common.css에서 .header-frame을 absolute로 잡았다면 아래 코드도 추가 */
        .header-frame {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10; /* 헤더가 가장 위로 오도록 */
            border: none;
            width: 100%;
            height: 80px;
        }

        .toc-header-area h1 {
            color: #ffffff !important;
            font-size: 3rem;
            margin: 0;
            text-align: left; /* 왼쪽 정렬 */
            letter-spacing: -1px;
        }

        .toc-bar {
            width: 100px;
            height: 6px;
            background-color: #e54863;
            margin: 20px 0 0 0; /* 왼쪽 정렬을 위해 margin-right를 auto로 하지 않음 */
        }

        .container {
            padding: 0 80px 60px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 1200px;
            /* 컨테이너 자체도 왼쪽 정렬 느낌을 주기 위해 margin-left 조절 가능 */
            margin: 0 auto; 
        }

        .card {
            display: flex;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-decoration: none;
            color: #333;
            border-radius: 6px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateX(10px); /* 왼쪽 정렬에 맞춰 오른쪽으로 살짝 이동하는 효과 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }

        .number {
            background: #e54863;
            color: white;
            font-size: 26px;
            font-weight: bold;
            width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .content {
            padding: 25px 30px;
        }

        .title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1c1f3a;
        }

        .desc {
            font-size: 1rem;
            color: #777;
            line-height: 1.5;
        }

        /* 5번 카드도 전체적인 균형을 위해 동일하게 유지 */
        .card:last-child {
            grid-column: span 1;
        }

        /* 헤더 프레임 상단 여백 보정 */
        .header-frame {
            border: none;
            width: 100%;
            height: 80px;
        }
    </style>
</head>
<body>

    <iframe src="header.html" class="header-frame" scrolling="no"></iframe>

    <div class="toc-header-area">
        <h1>목차</h1>
        <div class="toc-bar"></div>
    </div>

    <div class="container">
        <a href="01_status.html" class="card">
            <div class="number">01</div>
            <div class="content">
                <div class="title">전기 사고 현황</div>
                <div class="desc">국내 전기 사고 통계 및 추이 분석</div>
            </div>
        </a>

        <a href="02_accident_case.html" class="card">
            <div class="number">02</div>
            <div class="content">
                <div class="title">감전 사고 사례</div>
                <div class="desc">주요 감전 사고 원인과 인체 피해 분석</div>
            </div>
        </a>

        <a href="03_fire_case.html" class="card">
            <div class="number">03</div>
            <div class="content">
                <div class="title">화재 · 과열 사고 사례</div>
                <div class="desc">전기 화재 발생 주요 원인과 실제 사례</div>
            </div>
        </a>

        <a href="04_leakage_case.html" class="card">
            <div class="number">04</div>
            <div class="content">
                <div class="title">누전 사고 사례</div>
                <div class="desc">누전 발생 메커니즘과 현장 사례 분석</div>
            </div>
        </a>

        <a href="05_prevention.html" class="card">
            <div class="number">05</div>
            <div class="content">
                <div class="title">예방 대책 및 결론</div>
                <div class="desc">사고 예방을 위한 핵심 안전수칙 가이드</div>
            </div>
        </a>

        <a href="06_presentation_01.html" class="card">
            <div class="number">06</div>
            <div class="content">
                <div class="title">만든사람들 이야기</div>
                <div class="desc">멋진 발표</div>
            </div>
        </a> -->

    </div>

</body>
</html>
