<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>전기 사고 예방 프로젝트 - 전기 사고 현황</title>


    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/common.css">
    <title>전기 사고 예방</title>

    <style>
        /* [가독성 개선 핵심 부분] */
        .pie-label {
            position: absolute;
            font-weight: bold;
            font-size: 0.9rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
            /* 글자 주변에 미세한 그림자 추가 (가독성 확보) */
        }

        /* 각 데이터별 배경색에 맞춰 글자색 지정 */
        .label-navy {
            top: 30px;
            left: 35px;
            color: #ffffff;
        }

        /* 누전 10%: 어두운 배경 -> 흰색 글자 */
        .label-gold {
            bottom: 45px;
            right: 55px;
            color: #000000;
        }

        /* 화재 52%: 밝은 배경 -> 검은색 글자 */
        .label-red {
            top: 120px;
            right: 20px;
            color: #ffffff;
        }

        /* 감전 18%: 중간 배경 -> 흰색 글자 (또는 미세 그림자) */
        .label-gray {
            top: 60px;
            left: 30px;
            color: #ffffff;
        }

        /* 기타 20%: 중간 배경 -> 흰색 글자 */

        /* --- 이하 코드는 이전과 동일하지만 가독성을 위해 간략하게 표시 --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            font-family: 'Pretendard', sans-serif;
            color: #333;
        }

        .header-frame {
            width: 100%;
            height: 65px;
            border: none;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .container {
            max-width: 1100px;
            margin: 80px auto 40px;
            padding: 20px;
        }

        .title-section {
            background-color: #1e1e2f;
            color: white;
            padding: 25px 40px;
            border-bottom: 5px solid #e91e63;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
        }

        .title-section h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: bold;
        }

        .title-section .num {
            color: #e91e63;
            font-size: 2.5rem;
            margin-right: 15px;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: white;
            padding: 25px 20px;
            text-align: center;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            border-top: 5px solid #e91e63;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #e91e63;
            font-size: 2.2rem;
            margin: 0 0 8px 0;
        }

        .card p {
            font-weight: bold;
            font-size: 1.1rem;
            margin: 0 0 5px 0;
        }

        .card small {
            color: #888;
            font-size: 0.9rem;
        }

        .graph-section {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
        }

        .graph-card {
            background: white;
            padding: 25px;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .graph-card h3 {
            margin: 0 0 25px 0;
            font-size: 1.2rem;
        }

        .bar-chart-wrapper {
            position: relative;
            height: 250px;
            border-left: 2px solid #ddd;
            border-bottom: 2px solid #ddd;
            margin: 20px 20px 40px 50px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 0 10px;
        }

        .y-labels {
            position: absolute;
            left: -45px;
            height: 100%;
            display: flex;
            flex-direction: column-reverse;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 0.85rem;
            color: #777;
            width: 40px;
        }

        .bar-container {
            position: relative;
            width: 40px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        .bar {
            width: 100%;
            background-color: #e91e63;
            border-radius: 4px 4px 0 0;
            position: relative;
            animation: growBar 1s ease-out;
        }

        .bar-container .bar-value {
            position: absolute;
            top: -20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .bar-container .x-label {
            position: absolute;
            bottom: -25px;
            font-size: 0.9rem;
            color: #555;
        }

        .bar[data-year="2019"] {
            height: calc((2180 - 2050) / 400 * 100%);
        }

        .bar[data-year="2020"] {
            height: calc((2240 - 2050) / 400 * 100%);
        }

        .bar[data-year="2021"] {
            height: calc((2310 - 2050) / 400 * 100%);
        }

        .bar[data-year="2022"] {
            height: calc((2380 - 2050) / 400 * 100%);
        }

        .bar[data-year="2023"] {
            height: calc((2420 - 2050) / 400 * 100%);
        }

        @keyframes growBar {
            from {
                height: 0;
            }
        }

        .pie-chart-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 250px;
        }

        .pie-chart {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin-bottom: 20px;
            background: conic-gradient(#0f172a 0% 10%, #f59e0b 10% 62%, #b91c1c 62% 80%, #cbd5e1 80% 100%);
            position: relative;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            animation: rotatePie 1.2s ease-out;
        }

        .pie-chart::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
        }

        @keyframes rotatePie {
            from {
                transform: rotate(-90deg);
                opacity: 0;
            }

            to {
                transform: rotate(0deg);
                opacity: 1;
            }
        }

        /* 범례 디자인을 조금 더 보기 좋게 개선 */
        .legend {
            display: grid;
            grid-template-columns: 1fr 1fr;
            /* 2열로 배치해서 더 깔끔하게 */
            gap: 12px;
            font-size: 0.95rem;
            margin-top: 20px;
            text-align: left;
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-weight: 500;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            margin-right: 8px;
        }
    </style>

  

     
</head>

<body>

    <iframe src="header.html" class="header-frame" scrolling="no"></iframe>

    <div class="container">
        <div class="title-section">
            <span class="num">01</span>
            <h1>전기 사고 현황</h1>
        </div>

        <div class="summary-cards">
            <div class="card">
                <h2>연 2,300 건 +</h2>
                <p>전기 화재 발생</p>
                <small>전체 화재의 약 23%</small>
            </div>
            <div class="card">
                <h2>연 450 명 +</h2>
                <p>감전 사고 피해자</p>
                <small>사망 약 50 명 포함</small>
            </div>
            <div class="card">
                <h2>3,000 억 +</h2>
                <p>재산 피해액 ( 원 )</p>
                <small>매년 증가 추세</small>
            </div>
        </div>

        <div class="graph-section">
            <div class="graph-card">
                <h3>연도별 전기 화재 발생 건수</h3>
                <div class="bar-chart-wrapper">
                    <div class="y-labels"> <span>2050</span> <span>2150</span> <span>2250</span> <span>2350</span>
                        <span>2450</span> </div>
                    <div class="bar-container">
                        <div class="bar-value">2,180</div>
                        <div class="bar" data-year="2019"></div>
                        <div class="x-label">2019</div>
                    </div>
                    <div class="bar-container">
                        <div class="bar-value">2,240</div>
                        <div class="bar" data-year="2020"></div>
                        <div class="x-label">2020</div>
                    </div>
                    <div class="bar-container">
                        <div class="bar-value">2,310</div>
                        <div class="bar" data-year="2021"></div>
                        <div class="x-label">2021</div>
                    </div>
                    <div class="bar-container">
                        <div class="bar-value">2,380</div>
                        <div class="bar" data-year="2022"></div>
                        <div class="x-label">2022</div>
                    </div>
                    <div class="bar-container">
                        <div class="bar-value">2,420</div>
                        <div class="bar" data-year="2023"></div>
                        <div class="x-label">2023</div>
                    </div>
                </div>
            </div>

            <div class="graph-card">
                <h3>사고 유형별 비율</h3>
                <div class="pie-chart-container">
                    <div class="pie-chart"></div>

                    <div class="legend">
                        <div class="legend-item"><span class="dot" style="background:#b91c1c;"></span> 감전 (18%)</div>
                        <div class="legend-item"><span class="dot" style="background:#f59e0b;"></span> 전기 화재 (52%)</div>
                        <div class="legend-item"><span class="dot" style="background:#0f172a;"></span> 누전·단락 (10%)</div>
                        <div class="legend-item"><span class="dot" style="background:#cbd5e1;"></span> 기타 (20%)</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
