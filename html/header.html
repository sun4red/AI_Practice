<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/header.css">
    <style>
        /* 헤더 바 스타일 보완 */
        .header-bar {
            display: flex;
            align-items: center;
            background-color: #ffffff;
            padding: 10px 20px;
            border-bottom: 1px solid #ddd;
        }

        /* 공통 버튼 스타일 */
        .nav-btn {
            display: inline-flex;
            align-items: center;
            padding: 6px 15px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.2s;
            margin-right: 10px;
        }

        /* 🏠 HOME (메인 표지) */
        .home-btn {
            background-color: #1c1f3a;
            color: white !important;
        }
        .home-btn:hover { background-color: #000; }

        /* 📋 목차 (TOC) */
        .toc-btn {
            background-color: #ffffff;
            color: #e54863 !important;
            border: 1px solid #e54863;
        }
        .toc-btn:hover { background-color: #fff0f3; }

        .project-title {
            margin-left: 15px;
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <a href="index.html" class="nav-btn home-btn" target="_parent">🏠 HOME</a>
        
        <a href="index2.html" class="nav-btn toc-btn" target="_parent">📋 목차</a>
        
        <span class="project-title">전기 사고 예방 프로젝트</span>
    </div>
</body>
</html>
